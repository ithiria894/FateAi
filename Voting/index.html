<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問卷</title>
    <!-- Boostrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link href="index.css" rel="stylesheet" type="text/css">
</head>

<body>

    <!-- model -->


    <div class="container p-5 mb-1 bg-success text-white rounded-xl ">
        <h1 class="text-center">問卷調查 of 生日 vs mbti</h1>

        <!-- -------------------------------------------------------------------------------------------------------------- -->
        <div class="container p-5 mb-5 bg-primary text-white rounded-xl">
            <form>
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your name">
                </div>
                <div class="form-row">
                    <div class="form-group col-md-3">
                        <label for="birthyear">Birth Year:</label>
                        <input type="number" class="form-control" id="birthyear" placeholder="YYYY">
                    </div>
                    <div class="form-group col-md-3">
                        <label for="birthmonth">Birth Month:</label>
                        <input type="number" class="form-control" id="birthmonth" placeholder="MM">
                    </div>
                    <div class="form-group col-md-3">
                        <label for="birthday">Birth Day:</label>
                        <input type="number" class="form-control" id="birthday" placeholder="DD">
                    </div>
                    <div class="form-group col-md-3">
                        <label for="birthtime">Birth Time:</label>
                        <input type="text" class="form-control" id="birthtime" placeholder="Enter your birth time">
                    </div>
                </div>

                <div class="form-group">
                    <label for="gender">Gender:</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                        <label class="form-check-label" for="male">
                            Male
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                        <label class="form-check-label" for="female">
                            Female
                        </label>
                    </div>

                </div>
                <div class="form-group">
                    <label for="mbit-type">MBTI Type:</label>
                    <input type="text" class="form-control" id="mbit-type" placeholder="Enter your MBTI type">
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>

        </div>
    </div>




    <!-- jquery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <!-- boostrap javascript -->
    <!-- <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</body>

</html>
